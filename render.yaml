services:
  - type: web
    name: pi-agents-os
    runtime: node
    buildCommand: npm install
    startCommand: node server.js
    plan: free

    # Environment variables — set OPENAI_API_KEY and ANTHROPIC_API_KEY
    # in the Render dashboard under Environment > Secret Files / Env Vars.
    # DO NOT put real keys here — this file is committed to git.
    envVars:
      - key: NODE_ENV
        value: production
      - key: OPENAI_VOICE
        value: nova
      - key: OPENAI_API_KEY
        sync: false        # set manually in Render dashboard
      - key: ANTHROPIC_API_KEY
        sync: false        # set manually in Render dashboard
