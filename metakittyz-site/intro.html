if(!CanvasRenderingContext2D.prototype.roundRect){
  CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){
    r=typeof r==='number'?r:0;
    this.moveTo(x+r,y);this.lineTo(x+w-r,y);
    this.quadraticCurveTo(x+w,y,x+w,y+r);
    this.lineTo(x+w,y+h-r);this.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    this.lineTo(x+r,y+h);this.quadraticCurveTo(x,y+h,x,y+h-r);
    this.lineTo(x,y+r);this.quadraticCurveTo(x,y,x+r,y);
    this.closePath();
  };
}

}

// ── UTILS ──
function ease(t){return t<.5?2*t*t:-1+(4-2*t)*t;}
function cl(v,a,b){return Math.max(a,Math.min(b,v));}
function ac(h,a){
  var r=parseInt(h.slice(1,3),16),g=parseInt(h.slice(3,5),16),b=parseInt(h.slice(5,7),16);
  return 'rgba('+r+','+g+','+b+','+a+')';
}
function getDim(ms){for(var i=0;i<SCENES.length;i++)if(ms>=SCENES[i].s&&ms<SCENES[i].e)return SCENES[i];return SCENES[5];}
function dp(d,ms){return cl((ms-d.s)/(d.e-d.s),0,1);}
function glow(x,y,r,col,a){
  var g=ctx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,ac(col,a));g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(x-r,y-r,r*2,r*2);
}
function rb(y,h){
  var g=ctx.createLinearGradient(0,0,LW,0);
  [PK,CO,YL,TL,PU,PK].forEach(function(c,i){g.addColorStop(i/5,c);});
  ctx.fillStyle=g;ctx.fillRect(0,y,LW,h);
}
function rr(x,y,w,h,r){ctx.beginPath();ctx.roundRect(x,y,w,h,r);}

// particles + code rain
var PX=[];for(var i=0;i<80;i++)PX.push({x:Math.random()*LW,y:Math.random()*LH,vx:(Math.random()-.5)*.42,vy:(Math.random()-.5)*.42,r:Math.random()*2+.4,a:Math.random()*.6,c:[PK,TL,YL,PU,CO,MX][i%6]});
var CHS='01ROLETASK[]{}@FORMAT#$';
var CR=[];for(var i=0;i<44;i++)CR.push({x:Math.random()*LW,y:Math.random()*LH,ch:CHS[Math.floor(Math.random()*CHS.length)],sp:Math.random()*1.7+.6,a:Math.random()*.25+.05,sz:Math.floor(Math.random()*6)+7});

var T=0,lastT=null,rafId=null;

function drawBg(d){
  ctx.fillStyle='#000';ctx.fillRect(0,0,LW,LH);
  var g=ctx.createRadialGradient(CX,CY,0,CX,CY,LW*.65);
  g.addColorStop(0,ac(d.c1,.1));g.addColorStop(1,'#000');
  ctx.fillStyle=g;ctx.fillRect(0,0,LW,LH);
}
function drawCode(d){
  ctx.save();
  CR.forEach(function(c){
    c.y+=c.sp;if(c.y>LH+16){c.y=-16;c.x=Math.random()*LW;c.ch=CHS[Math.floor(Math.random()*CHS.length)];}
    ctx.globalAlpha=c.a*.35;ctx.fillStyle=d.c1;
    ctx.font=c.sz+'px Courier New';ctx.fillText(c.ch,c.x,c.y);
  });ctx.restore();
}
function drawParts(){
  ctx.save();
  PX.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=LW;if(p.x>LW)p.x=0;if(p.y<0)p.y=LH;if(p.y>LH)p.y=0;
    ctx.globalAlpha=p.a;ctx.fillStyle=p.c;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
  });ctx.restore();
}
function drawTunnel(d){
  ctx.save();var sp=T*.00016;
  for(var i=20;i>=0;i--){
    var z=((i/20+sp)%1),r=(1-z)*540+8;
    ctx.beginPath();ctx.arc(CX,CY,r,0,Math.PI*2);
    ctx.strokeStyle=ac(z>.5?d.c1:d.c2,z*z*.22);
    ctx.lineWidth=1.2+z*2;ctx.stroke();
  }ctx.restore();
}
function drawPortal(d,a,zm){
  if(a<.01)return;
  ctx.save();ctx.globalAlpha=a*.45;
  var pr=180+zm*40;
  ctx.beginPath();ctx.arc(CX,CY,pr,0,Math.PI*2);ctx.clip();
  var pw=PORTAL.width||1,ph=PORTAL.height||1;
  var sc=(pr*2)/Math.min(pw,ph)*(1+zm*.25);
  ctx.drawImage(PORTAL,CX-pw*sc/2,CY-ph*sc/2,pw*sc,ph*sc);
  ctx.restore();
  var rg=ctx.createRadialGradient(CX,CY,pr*.7,CX,CY,pr*1.3);
  rg.addColorStop(0,'transparent');rg.addColorStop(.7,ac(d.c1,.36*a));rg.addColorStop(1,'transparent');
  ctx.save();ctx.strokeStyle=rg;ctx.lineWidth=11;
  ctx.beginPath();ctx.arc(CX,CY,pr,0,Math.PI*2);ctx.stroke();ctx.restore();
}
function drawWarp(d,wA){
  if(wA<.01)return;
  ctx.save();
  for(var i=0;i<24;i++){
    var ang=(i/24)*Math.PI*2,len=90+wA*220;
    var wg=ctx.createLinearGradient(CX,CY,CX+Math.cos(ang)*len,CY+Math.sin(ang)*len);
    wg.addColorStop(0,'transparent');wg.addColorStop(.3,ac([d.c1,d.c2,WH,YL][i%4],.45*wA));wg.addColorStop(1,'transparent');
    ctx.strokeStyle=wg;ctx.lineWidth=1.3;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.lineTo(CX+Math.cos(ang)*len,CY+Math.sin(ang)*len);ctx.stroke();
  }
  glow(CX,CY,185*wA,d.c1,.44*wA);ctx.restore();
}
function scanlines(){
  ctx.save();ctx.globalAlpha=.04;
  for(var y=0;y<LH;y+=4){ctx.fillStyle='#000';ctx.fillRect(0,y,LW,2);}
  ctx.restore();
}

var KW=138,KH=92;
function drawKitty(scene,p){
  var entryA=ease(cl(p*4,0,1));
  var floatY=Math.sin(T*.002)*5;
  var excite=p<.15?Math.sin(p*Math.PI/.15)*14:0;
  // sit just above bottom bar (52px) + KH + label(14) + padding
  var kitX=20, kitY=LH-52-KH-18+floatY-excite+(1-entryA)*90;

  ctx.save();ctx.globalAlpha=entryA;
  glow(kitX+KW/2,kitY+KH/2,72,scene.c1,.18);
  ctx.drawImage(KITTY,kitX,kitY,KW,KH);

  // heart eye glow
  ctx.globalAlpha=entryA*(.5+.5*Math.sin(T*.007))*.28;
  glow(kitX+KW*.38,kitY+KH*.36,13,PK,.9);
  glow(kitX+KW*.62,kitY+KH*.36,13,PK,.9);
  ctx.globalAlpha=entryA;

  // label
  ctx.fillStyle=scene.c1;ctx.font='bold 9px Courier New';ctx.textAlign='center';
  ctx.fillText('KITTYBOT',kitX+KW/2,kitY+KH+12);

  // speech bubble
  var spArr=scene.speech;
  var lineIdx=Math.min(Math.floor(p*spArr.length*.92),spArr.length-1);
  var lineIn=ease(cl((p*spArr.length-lineIdx)*5,0,1));
  var txt=spArr[lineIdx];
  var bubX=kitX+KW+10, bubMaxW=210, bubPad=10, lineHt=18;
  ctx.font='bold 12px Courier New';
  var words=txt.split(' '),lines=[],cur='';
  words.forEach(function(w){
    var test=cur?cur+' '+w:w;
    if(ctx.measureText(test).width>bubMaxW-bubPad*2){if(cur)lines.push(cur);cur=w;}else cur=test;
  });
  if(cur)lines.push(cur);
  var bubH=bubPad*2+lines.length*lineHt;
  var bubY=kitY+KH/2-bubH/2;
  if(bubY<6)bubY=6;
  if(bubY+bubH>LH-58)bubY=LH-58-bubH;

  ctx.globalAlpha=entryA*lineIn;
  // bg
  ctx.fillStyle='rgba(0,0,0,.92)';rr(bubX,bubY,bubMaxW,bubH,10);ctx.fill();
  ctx.strokeStyle=ac(scene.c1,.75);ctx.lineWidth=2;rr(bubX,bubY,bubMaxW,bubH,10);ctx.stroke();
  // tail
  ctx.fillStyle='rgba(0,0,0,.92)';
  ctx.beginPath();ctx.moveTo(bubX,bubY+bubH/2-7);ctx.lineTo(bubX-10,bubY+bubH/2);ctx.lineTo(bubX,bubY+bubH/2+7);ctx.closePath();ctx.fill();
  ctx.strokeStyle=ac(scene.c1,.65);ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(bubX,bubY+bubH/2-7);ctx.lineTo(bubX-10,bubY+bubH/2);ctx.lineTo(bubX,bubY+bubH/2+7);ctx.stroke();
  // text
  ctx.fillStyle=WH;ctx.font='bold 12px Courier New';ctx.textAlign='left';
  lines.forEach(function(l,i){ctx.fillText(l,bubX+bubPad,bubY+bubPad+13+i*lineHt);});
  ctx.restore();
}

// ── SCENE 0: INTRO ──
function scene0(d,p){
  var rv=ease(cl(p*3,0,1)),pulse=.7+.3*Math.sin(T*.004);
  glow(CX,CY,290*pulse,PK,.15*rv);glow(CX,CY,175*pulse,PU,.18*rv);
  drawPortal(d,rv,p);
  ctx.save();
  ctx.globalAlpha=rv*.8;ctx.fillStyle=TL;ctx.textAlign='center';
  ctx.font='bold 13px Courier New';
  ctx.fillText('BUILD AI AGENTS LIVE  ·  @metakittyz  ·  2026',CX,38);
  var ta=ease(cl((p-.08)*2.5,0,1));ctx.globalAlpha=ta;
  ctx.font='900 68px Courier New';
  var tg=ctx.createLinearGradient(CX-245,0,CX+245,0);
  tg.addColorStop(0,PK);tg.addColorStop(.5,YL);tg.addColorStop(1,TL);
  ctx.fillStyle=ac(PU,.26);ctx.fillText('THE 5-LAYER',CX+3,CY-46);ctx.fillText('PROMPT FORMULA',CX+3,CY+28);
  ctx.fillStyle=tg;ctx.fillText('THE 5-LAYER',CX,CY-49);
  ctx.fillStyle=WH;ctx.fillText('PROMPT FORMULA',CX,CY+25);
  ctx.globalAlpha=ease(cl((p-.3)*3,0,1));
  ctx.fillStyle='#666';ctx.font='13px Courier New';
  ctx.fillText('Every great AI output starts with a great prompt.',CX,CY+72);
  ctx.globalAlpha=ease(cl((p-.5)*3,0,1));
  ctx.fillStyle=PK;ctx.font='bold 18px Courier New';ctx.fillText('@METAKITTYZ',CX,LH-60);
  ctx.restore();
  rb(LH-5,5);
  drawKitty(d,p);
}

// ── SCENES 1-4 ──
// LAYOUT (all coords in 1280×720 space):
//   Top safe area:  y=0..56   → badge lives here
//   Content area:   y=56..668 (612px tall)
//     Top label row:  y=58..138  (80px) — [LABEL] + formula subtitle
//     Divider:        y=138
//     Main row:       y=142..614 (472px)
//       LEFT  x=24..504   w=480  — title headline + body
//       SPLIT x=504       vertical separator
//       RIGHT x=512..1256 w=744  — formula card
//   Bottom bar:     y=668..720  (52px)
var BADGE_H=56, DIV_Y=138, MAIN_Y=144, BOT_Y=668;
var LEFT_X=28, LEFT_W=472;
var RIGHT_X=514, RIGHT_W=LW-RIGHT_X-24; // =742

function sceneDim(d,p){
  var wI=ease(cl(p/.2,0,1)),cA=ease(cl((p-.2)/.15,0,1)),
      wO=ease(cl((p-.82)/.18,0,1)),show=cA*Math.max(0,1-wO*3);
  var warpA=Math.max(
    wI<.7?ease(cl(p/.12,0,1))*(1-ease(cl((p-.18)/.06,0,1))):0,
    ease(cl((p-.85)/.1,0,1))
  );
  drawWarp(d,warpA);

  // ── BADGE (top-left, y=14..46) ──
  ctx.save();ctx.globalAlpha=show;
  ctx.fillStyle=ac(d.c1,.12);rr(LEFT_X,14,220,32,8);ctx.fill();
  ctx.strokeStyle=ac(d.c1,.32);ctx.lineWidth=1.4;rr(LEFT_X,14,220,32,8);ctx.stroke();
  ctx.fillStyle=d.c1;ctx.font='bold 11px Courier New';ctx.textAlign='left';
  ctx.fillText('◈  '+d.nm+'  —  '+d.sub,LEFT_X+12,34);
  ctx.restore();

  // ── [LABEL] — top center-right, y=60..130 ──
  var labelCX=RIGHT_X+RIGHT_W/2; // center of right col
  ctx.save();ctx.globalAlpha=show;ctx.textAlign='center';
  var lsz=d.lbl.length>9?52:d.lbl.length>6?68:82;
  ctx.font='900 '+lsz+'px Courier New';
  var lg=ctx.createLinearGradient(labelCX-200,0,labelCX+200,0);
  lg.addColorStop(0,d.c1);lg.addColorStop(1,d.c2);ctx.fillStyle=lg;
  var ly=62+lsz+(1-cA)*20; // baseline sits at ~62+lsz
  glow(labelCX,ly-lsz*.4,200,d.c1,.14);
  ctx.fillText(d.lbl,labelCX,ly);
  ctx.font='bold 14px Courier New';ctx.fillStyle=ac(WH,.48);
  ctx.fillText(d.fm,labelCX,ly+26);
  ctx.restore();

  // ── DIVIDER ──
  ctx.save();ctx.globalAlpha=show;rb(DIV_Y,3);ctx.restore();

  // ── LEFT: title ──
  var mainH=BOT_Y-MAIN_Y; // 524px
  ctx.save();ctx.globalAlpha=ease(cl((p-.26)/.18,0,1))*Math.max(0,1-wO*4);
  var tlines=d.ttl;
  var tsz=tlines.some(function(l){return l.length>12;})?40:48;
  var lineGap=tsz+10;
  // vertically center the title block in the top 55% of mainH
  var titleBlock=tlines.length*lineGap;
  var ty=MAIN_Y+Math.round((mainH*.5-titleBlock)/2)+tsz;
  ctx.textAlign='left';
  var tfg=ctx.createLinearGradient(0,ty-tsz,0,ty+titleBlock);
  tfg.addColorStop(0,WH);tfg.addColorStop(1,ac(d.c1,.88));
  ctx.strokeStyle=ac(d.c1,.18);ctx.lineWidth=5;
  tlines.forEach(function(l){ctx.beginPath();ctx.font='900 '+tsz+'px Courier New';ctx.strokeText(l,LEFT_X,ty);ty+=lineGap;});
  ty=MAIN_Y+Math.round((mainH*.5-titleBlock)/2)+tsz;
  ctx.fillStyle=tfg;
  tlines.forEach(function(l){ctx.font='900 '+tsz+'px Courier New';ctx.fillText(l,LEFT_X,ty);ty+=lineGap;});

  // ── LEFT: body ──
  ctx.globalAlpha=ease(cl((p-.34)/.18,0,1))*Math.max(0,1-wO*4);
  ctx.fillStyle='#aaa';ctx.font='14px Courier New';
  var by=ty+18;
  d.bod.forEach(function(l){ctx.fillText(l,LEFT_X,by);by+=23;});
  ctx.restore();

  // ── RIGHT: formula card ──
  var cardH=BOT_Y-MAIN_Y-8; // 516px
  ctx.save();ctx.globalAlpha=ease(cl((p-.38)/.18,0,1))*Math.max(0,1-wO*4);
  ctx.fillStyle='rgba(0,0,0,.76)';rr(RIGHT_X,MAIN_Y,RIGHT_W,cardH,12);ctx.fill();
  ctx.strokeStyle=ac(d.c1,.2);ctx.lineWidth=1.5;rr(RIGHT_X,MAIN_Y,RIGHT_W,cardH,12);ctx.stroke();
  ctx.fillStyle=d.c1;rr(RIGHT_X,MAIN_Y,4,cardH,[12,0,0,12]);ctx.fill();

  ctx.fillStyle=ac(d.c1,.65);ctx.font='bold 11px Courier New';ctx.textAlign='left';
  ctx.fillText('// THE PROMPT FORMULA',RIGHT_X+18,MAIN_Y+24);

  // 5 formula rows evenly distributed
  var fl=[
    {tag:'[ROLE]',      txt:'You are a [specific expert].',        c:PK, hl:d.id===1},
    {tag:'[CONTEXT]',   txt:'My audience: [who] on [platform].',   c:TL, hl:d.id===2},
    {tag:'[TASK]',      txt:'Write [exactly what] — [N] options.', c:YL, hl:d.id===3},
    {tag:'[FORMAT]',    txt:'[Structure]. Max [N] words each.',     c:CO, hl:d.id===4},
    {tag:'[CONSTRAINTS]',txt:'Never: [X]. Always: [Y].',           c:PU, hl:d.id>=4},
  ];
  var rowH=Math.floor((cardH-42)/5);
  fl.forEach(function(f,idx){
    var ry=MAIN_Y+42+idx*rowH;
    var ha=f.hl?1:.26;
    if(f.hl){
      ctx.fillStyle=ac(f.c,.1);rr(RIGHT_X+10,ry-2,RIGHT_W-20,rowH-2,6);ctx.fill();
      ctx.strokeStyle=ac(f.c,.3);ctx.lineWidth=1;rr(RIGHT_X+10,ry-2,RIGHT_W-20,rowH-2,6);ctx.stroke();
    }
    ctx.globalAlpha=ease(cl((p-.38)/.18,0,1))*Math.max(0,1-wO*4)*ha;
    ctx.fillStyle=f.c;ctx.font='bold 13px Courier New';ctx.textAlign='left';
    ctx.fillText(f.tag,RIGHT_X+18,ry+18);
    ctx.fillStyle=f.hl?WH:'#555';ctx.font='12px Courier New';
    ctx.fillText(f.txt,RIGHT_X+18,ry+35);
  });
  ctx.restore();

  // watermark
  ctx.save();ctx.globalAlpha=.05*show;ctx.textAlign='right';
  ctx.font='900 270px Courier New';ctx.fillStyle=d.c1;ctx.fillText(String(d.id),LW-18,LH-14);ctx.restore();

  // ── BOTTOM BAR ──
  ctx.save();ctx.globalAlpha=show;
  ctx.fillStyle='rgba(0,0,0,.84)';ctx.fillRect(0,BOT_Y,LW,LH-BOT_Y);
  rb(LH-4,4);
  ctx.fillStyle='#3a3a3a';ctx.font='11px Courier New';ctx.textAlign='left';
  ctx.fillText('DIMENSION '+d.id+' OF 5  ·  '+d.sub+'  ·  @metakittyz',18,BOT_Y+30);
  ctx.fillStyle=d.c1;ctx.font='bold 11px Courier New';ctx.textAlign='right';
  ctx.fillText('#MetakittyzBuild  ·  LAYER '+d.id+'/5',LW-18,BOT_Y+30);
  ctx.restore();

  drawKitty(d,p);
}

// ── SCENE 5: OUTRO ──
function scene5(d,p){
  var rv=ease(cl(p*2,0,1));
  glow(CX,CY,410,PU,.18*rv);glow(CX,CY,240,PK,.15*rv);
  drawPortal(d,rv,p);
  ctx.save();ctx.globalAlpha=rv;ctx.textAlign='center';
  ctx.font='900 62px Courier New';
  var og=ctx.createLinearGradient(CX-205,0,CX+205,0);
  og.addColorStop(0,PK);og.addColorStop(.5,YL);og.addColorStop(1,TL);
  ctx.fillStyle=ac(PU,.24);ctx.fillText('YOU ARE READY.',CX+3,CY-44);ctx.fillText('NOW GO BUILD.',CX+3,CY+20);
  ctx.fillStyle=og;ctx.fillText('YOU ARE READY.',CX,CY-47);
  ctx.fillStyle=WH;ctx.fillText('NOW GO BUILD.',CX,CY+17);
  ctx.font='14px Courier New';ctx.fillStyle='#666';
  ctx.fillText('Role  ·  Context  ·  Task  ·  Format  ·  Constraints',CX,CY+56);
  ctx.fillText('5 layers. Every prompt. Every time.',CX,CY+77);
  ctx.font='bold 20px Courier New';
  var hg=ctx.createLinearGradient(CX-90,0,CX+90,0);hg.addColorStop(0,PK);hg.addColorStop(1,PU);ctx.fillStyle=hg;
  ctx.fillText('@METAKITTYZ',CX,CY+116);
  ctx.font='11px Courier New';ctx.fillStyle=TL;
  ctx.fillText('#MetakittyzBuild  ·  BUILD AI AGENTS LIVE  ·  LEARNING IN PUBLIC 2026',CX,LH-58);
  ctx.restore();
  rb(LH-5,5);
  drawKitty(d,p);
}

// ── RENDER LOOP ──
function render(ts){
  if(!lastT)lastT=ts;
  var dt=Math.min(ts-lastT,50);lastT=ts;T=Math.min(T+dt,TOTAL);
  var d=getDim(T),p=dp(d,T);
  drawBg(d);drawCode(d);drawTunnel(d);drawParts(d);
  if(d.id===0)scene0(d,p);
  else if(d.id<=4)sceneDim(d,p);
  else scene5(d,p);
  scanlines();
  document.getElementById('bar').style.width=(T/TOTAL*100)+'%';
  var rem=Math.ceil((TOTAL-T)/1000);
  document.getElementById('tmr').textContent=String(Math.floor(rem/60)).padStart(2,'0')+':'+String(rem%60).padStart(2,'0');
  if(T<TOTAL)rafId=requestAnimationFrame(render);
  else setTimeout(function(){T=0;lastT=null;rafId=requestAnimationFrame(render);},2000);
}
function restart(){T=0;lastT=null;cancelAnimationFrame(rafId);rafId=requestAnimationFrame(render);}

var loaded=0;
function onLoad(){if(++loaded>=2)rafId=requestAnimationFrame(render);}
PORTAL.onload=PORTAL.onerror=onLoad;
KITTY.onload=KITTY.onerror=onLoad;
</script>
